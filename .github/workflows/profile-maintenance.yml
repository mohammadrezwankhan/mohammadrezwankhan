name: Profile maintenance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/profile-maintenance.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/profile-maintenance.yml"
  schedule:
    - cron: "30 7 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    name: Check profile links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check README links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude '^https://fr\.linkedin\.com/.*'
            README.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create maintenance issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Profile maintenance: broken README link detected";
            const body = [
              "The scheduled profile maintenance workflow found a broken or unreachable link in `README.md`.",
              "",
              "Suggested next step:",
              "- Open the failed workflow run.",
              "- Identify the broken link.",
              "- Fix it in a small pull request.",
              "",
              "This workflow is designed to create real maintenance prompts, not empty contribution noise."
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "profile-maintenance"
            });

            if (!existing.data.some(issue => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["profile-maintenance"]
              });
            }
